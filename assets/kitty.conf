# ==================================================
# Kitty configuration — macOS
# ==================================================
# vim:fileencoding=utf-8:foldmethod=marker

# --------------------------------------------------
# Fonts
# --------------------------------------------------
font_family      JetBrains Mono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        18

# Slightly tighter glyphs (optional)
modify_font cell_width 95%

# --------------------------------------------------
# Window & Appearance
# --------------------------------------------------
hide_window_decorations yes
confirm_os_window_close 0

dynamic_background_opacity yes
background_opacity 0.9

tab_bar_style hidden

# foreground #dddddd
foreground #DCD7BA
background #000000
selection_background #2D4F67
selection_foreground #C8C093
url_color #72A7BC
cursor #C8C093

# Tabs
active_tab_background #1F1F28
active_tab_foreground #C8C093
inactive_tab_background  #1F1F28
inactive_tab_foreground #727169
# tab_bar_background #15161E

# normal
color0 #16161D
color1 #C34043
color2 #76946A
color3 #C0A36E
color4 #7E9CD8
color5 #957FB8
color6 #6A9589
color7 #C8C093

# bright
color8  #727169
color9  #E82424
color10 #98BB6C
color11 #E6C384
color12 #7FB4CA
color13 #938AA9
color14 #7AA89F
color15 #DCD7BA


# extended colors
color16 #FFA066
color17 #FF5D62
  
# --------------------------------------------------
# Cursor
# --------------------------------------------------
cursor_shape block
cursor_blink true

cursor_trail 10
cursor_trail_start_threshold 0
cursor_trail_decay 0.01 0.15

# --------------------------------------------------
# Selection
# --------------------------------------------------
selection_foreground none
selection_background none

# --------------------------------------------------
# Scrolling
# --------------------------------------------------
scrollback_lines 2000
wheel_scroll_min_lines 1

# --------------------------------------------------
# Shell / Integration
# --------------------------------------------------
shell_integration no-cursor

# --------------------------------------------------
# Audio
# --------------------------------------------------
enable_audio_bell no

# --------------------------------------------------
# Remote control (REQUIRED for Hammerspoon)
# --------------------------------------------------
allow_remote_control yes
# Optional but recommended:
listen_on unix:/tmp/kitty

# --------------------------------------------------
# Key mappings (disable defaults you don't want)
# --------------------------------------------------
map ctrl+shift+t discard_event
map cmd+enter discard_event
map ctrl+shift+q discard_event
map ctrl+shift+right discard_event
map ctrl+shift+left discard_event
map ctrl+shift+enter discard_event 
map ctrl+shift+enter discard_event
map ctrl+shift+w discard_event
map ctrl+shift+] discard_event
map ctrl+shift+[ discard_event
map ctrl+shift+f7 discard_event
map ctrl+shift+f8 discard_event
map ctrl+shift+l discard_event
map ctrl+shift+up discard_event
map ctrl+shift+down discard_event
map ctrl+shift+left discard_event
map ctrl+shift+right discard_event
map ctrl+shift+c discard_event
map ctrl+shift+v discard_event
map ctrl+shift+up discard_event
map ctrl+shift+down discard_event
map ctrl+shift+page_up discard_event
map ctrl+shift+page_down discard_event
map ctrl+shift+home discard_event
map ctrl+shift+end discard_event
map ctrl+shift+equal discard_event
map ctrl+shift+minus discard_event
map ctrl+shift+backspace discard_event
map ctrl+shift+f2 discard_event
map ctrl+shift+f5 discard_event
map ctrl+shift+f6 discard_event
map ctrl+shift+escape discard_event

# --------------------------------------------------
# Opacity shortcuts (macOS-friendly)
# --------------------------------------------------
map super+u        set_background_opacity 1
map super+shift+u  set_background_opacity default
map super+shift+i  set_background_opacity 0.7

